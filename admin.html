<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/admin.css">
  <script>
    const savedTheme = localStorage.getItem("timetableTheme");
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    document.documentElement.setAttribute("data-theme", savedTheme ? savedTheme : (prefersDark ? "dark" : "light"));
  </script>
</head>
<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>

  <div class="wrap">
    <header>
      <div class="header-actions">
        <a href="index.html" class="admin-toggle">🏠</a>
      </div>
      <h1>Admin Dashboard</h1>
      <p class="eyebrow">KTU S3 CSE · Event Management</p>
    </header>

    <div class="card" style="padding: 24px; margin-bottom: 24px;">
      <h2 style="font-size: 18px; margin-top: 0;">Add New Event</h2>

      <!-- LOCK SCREEN -->
      <div id="lockScreen">
        <p style="font-size: 13px; color: var(--ink-soft); margin: 0;">Enter your admin password to manage events.</p>
        <input type="password" id="password" placeholder="Admin Password" required class="input-field">
        <button id="unlockBtn" style="padding: 14px; background: var(--dal); color: #fff; border: none; border-radius: 12px; font-weight: 700; font-family: inherit; cursor: pointer;">Unlock Dashboard</button>
      </div>

      <div id="eventBuilder">
        <select id="type" class="input-field" required>
          <option value="test">Class Test</option>
          <option value="deadline">Assignment / Deadline</option>
          <option value="exam">Series</option>
          <option value="general">General Event</option>
          <option value="reminder">Reminder</option>
        </select>

        <div id="normalFields" style="display: flex; flex-direction: column; gap: 14px;">
          <div id="eventRows">
            <div class="event-row">
              <select class="input-field event-subject">
                <option value="" disabled selected>Loading subjects...</option>
                <option value="">— No subject —</option>
              </select>
              <input type="text" class="input-field event-title" placeholder="Event Title" required>
              <input type="date" class="input-field event-date" required>
              <button type="button" class="event-remove-btn" style="display:none;">✕</button>
            </div>
          </div>
          <button type="button" id="addEventRow" class="add-row-btn">+ Add Another</button>
        </div>

        <div id="seriesFields" style="display: none;">
          <input type="text" id="seriesGlobalName" class="input-field" placeholder="Series name (optional)">
          <div id="seriesRows">
            <div class="series-row">
              <select class="input-field series-subject" required>
                <option value="" disabled selected>Subject</option>
              </select>
              <input type="date" class="input-field series-date" required>
              <button type="button" class="series-remove-btn" style="display: none;">✕</button>
            </div>
          </div>
          <button type="button" id="addSeriesRow" class="add-row-btn">+ Add Another Date</button>
        </div>

        <button type="button" id="submitEventsBtn" style="padding: 14px; background: var(--toc); color: #fff; border: none; border-radius: 12px; font-weight: 700; font-family: inherit; cursor: pointer; margin-top: 8px;">Push to Schedule</button>
      </div>
      <p id="status" style="margin-top: 16px; font-weight: 600; text-align: center; font-size: 14px;"></p>
    </div>

    <!-- Active Events List -->
    <div class="card" style="padding: 24px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h2 style="font-size: 18px; margin: 0;">Active Events</h2>
        <div style="display:flex;gap:8px;">
          <button id="deleteSelectedBtn" class="del-btn" style="display:none;">Delete Selected</button>
          <button id="clearAllBtn" class="del-btn" style="background:var(--ds);">Clear All</button>
        </div>
      </div>
      <div id="eventsList">
        <p style="color: var(--ink-soft); font-size: 14px;">Loading existing events...</p>
      </div>
    </div>

    <!-- Holidays Section (hidden until unlocked) -->
    <div id="holidaysSection" class="card" style="padding: 24px; display: none;">
      <h2 style="font-size: 18px; margin-top: 0; margin-bottom: 16px;">Holidays</h2>
      <p style="font-size: 13px; color: var(--ink-soft); margin: 0 0 12px;">On these dates all notifications are disabled (except Friday reminder).</p>
      <div id="holidayForm" style="display: flex; gap: 10px; margin-bottom: 16px;">
        <input type="date" id="holidayDate" class="input-field" style="flex: 1;">
        <button id="addHolidayBtn" style="padding: 12px 20px; background: var(--ee); color: #fff; border: none; border-radius: 12px; font-weight: 700; font-family: inherit; cursor: pointer; white-space: nowrap;">Add Holiday</button>
      </div>
      <div id="holidaysList">
        <p style="color: var(--ink-soft); font-size: 14px;">No holidays set.</p>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
