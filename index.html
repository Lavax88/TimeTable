<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S3 CSE · Room A214 · Timetable</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/index.css">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
</head>
<body>

<div x-data="timetableApp()" x-init="init()" :data-theme="theme" :class="examModeActive ? 'exam-active' : ''">

  <div class="wrap">

    <!-- Loading -->
    <div x-show="!loaded" class="loading">Loading timetable…</div>

    <!-- Main content (visible after load) -->
    <template x-if="loaded">
      <div>
        <!-- Header -->
        <header>
          <div class="header-actions">
            <button class="header-btn" @click="toggleTheme" x-html="themeIcon" aria-label="Toggle theme"></button>
            <button class="header-btn" @click="showInstallBanner" aria-label="Install app" id="installHeaderBtn">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </button>
          </div>
          <p class="eyebrow">CSE Department · Semester S3 · 2026–2027</p>
          <h1 x-text="isExamDay ? examTitle : 'Weekly Class Timetable'"></h1>
          <div class="meta-row">
            <span class="meta-chip">📍 Room A214</span>
            <span class="meta-chip">Batch advisors: Sweety C Joy · Preeja Mol</span>
          </div>
        </header>

        <!-- Upcoming Deadlines -->
        <div x-show="upcomingDeadlines.length">
          <p class="section-title">Urgent Tasks</p>
          <template x-for="ev in upcomingDeadlines" :key="eventKey(ev)">
            <div class="card card-event">
              <div class="card-inner">
                <div class="card-accent" :style="`background: var(--${ev.type === 'deadline' ? 'ds' : ev.type === 'test' ? 'mat' : 'toc'})`"></div>
                <div class="event-date">
                  <span x-text="new Date(ev.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'})"></span>
                  <span class="day" x-text="ev.type.toUpperCase()"></span>
                </div>
                <div class="card-body">
                  <div class="card-info">
                    <p class="subj-name" x-text="ev.title + (ev.subject ? ' (' + ev.subject + ')' : '')"></p>
                    <div class="progress-wrap">
                      <div class="progress-track">
                        <div class="progress-fill" :style="`width: ${eventProgressPct(ev)}%`"></div>
                      </div>
                      <span class="progress-remaining" x-text="eventProgressLabel(ev)"></span>
                    </div>
                  </div>
                  <div x-show="ev.type === 'deadline' || ev.type === 'reminder'" style="flex:0 0 auto">
                    <button class="card-chip" :style="`background: var(--${isEventCompleted(ev) ? 'ee-bg' : 'oop-bg'}); color: var(--${isEventCompleted(ev) ? 'ee' : 'oop'})`"
                            @click.stop="toggleEventComplete(ev)" x-text="isEventCompleted(ev) ? '↩' : '✓'"></button>
                  </div>
                </div>
              </div>
            </div>
          </template>
          <p class="section-title" style="margin-top:24px">Timetable</p>
        </div>

        <!-- Exam Mode -->
        <div x-show="examModeActive">
          <div class="exam-banner" x-text="'📌 Exam mode active'"></div>
          <template x-for="ev in upcomingExams" :key="eventKey(ev)">
            <div class="card card-event">
              <div class="card-inner">
                <div class="card-accent" style="background:var(--ds)"></div>
                <div class="event-date">
                  <span x-text="new Date(ev.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'})"></span>
                  <span class="day">EXAM</span>
                </div>
                <div class="card-body">
                  <div class="card-info">
                    <p class="subj-name" x-text="ev.title + (ev.subject ? ' (' + ev.subject + ')' : '')"></p>
                    <div class="progress-wrap">
                      <div class="progress-track">
                        <div class="progress-fill" :style="`width: ${eventProgressPct(ev)}%`"></div>
                      </div>
                      <span class="progress-remaining" x-text="eventProgressLabel(ev)"></span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </template>
        </div>

        <!-- Day Panels -->
        <div class="panels" @touchstart="touchStart" @touchend="touchEnd">
          <template x-for="day in days" :key="day">
            <div x-show="currentDay === day" x-transition:enter="panel-enter">
              <!-- Exams tab -->
              <template x-if="day === 'Exams'">
                <div>
                  <div x-show="!upcomingExams.length" class="empty-state">No upcoming exams scheduled.</div>
                  <template x-for="ev in upcomingExams" :key="eventKey(ev)">
                    <div class="card card-event">
                      <div class="card-inner">
                        <div class="card-accent" style="background:var(--ds)"></div>
                        <div class="event-date">
                          <span x-text="new Date(ev.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'})"></span>
                          <span class="day">EXAM</span>
                        </div>
                        <div class="card-body">
                          <div class="card-info">
                            <p class="subj-name" x-text="ev.title + (ev.subject ? ' (' + ev.subject + ')' : '')"></p>
                            <div class="progress-wrap">
                              <div class="progress-track">
                                <div class="progress-fill" :style="`width: ${eventProgressPct(ev)}%`"></div>
                              </div>
                              <span class="progress-remaining" x-text="eventProgressLabel(ev)"></span>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </template>
                </div>
              </template>

              <!-- Regular day panels -->
              <template x-if="day !== 'Exams'">
                <div>
                  <!-- Saturday caution -->
                  <div x-show="showSaturdayCaution(day)" class="caution">
                    ⚠️ No classes this Saturday — classes only run on the 1st &amp; 3rd Saturdays of the month.
                  </div>

                  <!-- No schedule -->
                  <div x-show="!SCHEDULE || !SCHEDULE[day] || !SCHEDULE[day].length" class="empty-state">
                    No classes scheduled.
                  </div>

                  <!-- Schedule cards -->
                  <template x-for="p in getSchedule(day)" :key="periodKey(p)">
                    <div>
                      <!-- Break -->
                      <div x-show="p[2] === 'BREAK'"
                           class="card card-break"
                           :class="{ 'card-break-now': isClassDay(day) && isOngoing(p[0], p[1]) }">
                        <div class="card-inner">
                          <div class="card-body">
                            <div class="card-info">
                              <p class="subj-name" x-show="isClassDay(day) && isOngoing(p[0], p[1])">
                                <span class="now-tag" style="background:var(--ink)">Ongoing break</span>
                              </p>
                              <p class="subj-name">☕ Break</p>
                              <p class="subj-sub" x-text="p[3] + ' free'"></p>
                              <div x-show="isClassDay(day) && isOngoing(p[0], p[1])" class="progress-wrap">
                                <div class="progress-track">
                                  <div class="progress-fill" style="background:var(--ink)"></div>
                                </div>
                                <span class="progress-remaining" x-text="progressLabel(p[0], p[1])"></span>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>

                      <!-- Subject card -->
                      <div x-show="p[2] !== 'BREAK'"
                           class="card"
                           :class="{ 'card-now': isClassDay(day) && isOngoing(p[0], p[1]) }"
                           :data-subj="p[2]"
                           :data-end-min="minutesOf(p[1])"
                           :style="`--card-accent: ${accentColors(p[2])[0]}`">
                        <div class="card-inner">
                          <div class="card-accent" :style="cardAccentStyle(p[2])"></div>
                          <div class="card-body">
                            <div class="card-info">
                              <div class="card-time">
                                <span x-text="formatTime(p[0])"></span><span class="sep">–</span><span x-text="formatTime(p[1])"></span>
                              </div>
                              <p x-show="isClassDay(day) && isOngoing(p[0], p[1])" class="now-tag">Ongoing lecture</p>
                              <p class="subj-name">
                                <span x-text="subjectName(p[2])"></span>
                                <span x-show="p[3]" style="font-weight:400;color:var(--ink-soft);font-size:13px;" x-text="' (' + p[3] + ')'"></span>
                              </p>
                              <p class="subj-sub" x-html="subjectLine(p[2])"></p>
                              <div x-show="isClassDay(day) && isOngoing(p[0], p[1])" class="progress-wrap">
                                <div class="progress-track">
                                  <template x-for="pos in dividerPositions(p[2], p[4] || 1)" :key="pos">
                                    <div class="progress-divider" :style="`left: ${pos}%`"
                                         :class="{ 'passed': progressPercent(p[0], p[1]) >= pos }"></div>
                                  </template>
                                  <div class="progress-fill" :style="`width: ${progressPercent(p[0], p[1])}%`"></div>
                                </div>
                                <span class="progress-remaining" x-text="progressLabel(p[0], p[1])"></span>
                              </div>
                            </div>
                            <div class="card-chip" :style="`background: ${accentColors(p[2])[1]}; color: ${accentColors(p[2])[0]}`"
                                 x-text="subjectChip(p[2])"></div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </template>
        </div>

        <!-- Legend -->
        <p class="section-title">Subjects &amp; Faculty</p>
        <div class="legend">
          <template x-for="item in LEGEND" :key="item[0]">
            <div class="legend-item">
              <span class="legend-dot" :style="`background: ${accentColors(item[0])[0]}`"></span>
              <div>
                <b x-text="item[1]"></b>
                <span x-text="item[2]"></span>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>
  </div>

  <!-- Bottom Tab Navigation -->
  <template x-if="loaded">
    <nav class="tabs">
      <template x-for="day in days" :key="day">
        <button class="tab"
                :class="{ 'active': currentDay === day, 'today': day === currentDayName && day !== 'Exams' }"
                @click="selectDay(day)">
          <span x-text="day === 'Exams' ? 'Exams' : day.slice(0,3)"></span>
          <span class="dot"></span>
        </button>
      </template>
    </nav>
  </template>

  <!-- Install Banner -->
  <div class="install-banner" :class="{ 'visible': installVisible }">
    <div class="install-backdrop" @click="hideInstallBanner"></div>
    <div class="install-card">
      <button class="install-close" @click="hideInstallBanner">&times;</button>
      <strong>Install Timetable</strong>
      <span>Add to home screen for quick access</span>
      <button class="install-btn" @click="doInstall" x-text="_deferredPrompt ? 'Install App' : (isIOS ? 'Use Share → Add to Home Screen' : 'Open in Chrome')"></button>
    </div>
  </div>

</div>

<script src="js/timetable.js"></script>
<script src="js/features.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js" crossorigin="anonymous"></script>

</body>
</html>
